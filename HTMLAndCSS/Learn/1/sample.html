<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample HTML  Page</title>
</head>
<body>
    <form action="index.php" method="post"enctype="multipart/form-data">
    <label for="username">Username:</label>
    <input type="text" id="username" placeholder="username" minlength="6" maxlength="15" name="username" required>
    
    <label for="password">password:</label>
    <input type="password" id="password" minlength="6" maxlength="15" name="username"><br>

    <input type="email" id="email" placeholder="email" name="email" required><br>
    <input type="tel" id="phone" placeholder="123-456-7890" name="phone" required><br>
    <label for="bday">birthdate:</label>
    <input type="date" id="bday"><br>
    <label for="quantity">quantity:</label>
    <input type="number" id="quantity" min="0" max="100"><br>

    <label for="title">title:</label>
    <label for="Mr.">Mr.:</label>
    <input type="radio" id="Mr." value="Mr."name="title">
    <label for="Ms.">Ms.:</label>
    <input type="radio" id="Ms." value="Ms."name="title"><br>
    <label for="PhD">PhD:</label>
    <input type="radio" id="PhD" value="PhD."name="title"><br>

    <label for="payment.">payment:</label>
    <select id="payment" name="payment">
        <option value="visa">visa</option>
        <option value="mastercard">mastercard</option>
        <option value="giftcard">giftcard</option>
    </select><br>
    <label for="subscribe">payment</label>
    <input type="checkbox" id="subscribe"><br>

    <label for="comment">comment</label>
    <textarea id="comment" name="comment" rows="3" cols="25" placeholder="Enter your comment here..."></textarea><br>

    <label for="file">file</label>
    <input type="file" id="file" accept="image/png, image/jpeg" name="fileupload"><br>

    <input type="reset"><br>
    <input type="submit">
    <h1>Welcome to the Sample HTML Page</h1>
    <p>This is a simple HTML document structure.</p>
</html>
